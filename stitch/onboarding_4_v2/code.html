<!DOCTYPE html>

                    "body": ["Inter", "sans-serif"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .kerning-editorial {
            letter-spacing: 0.25em;
        }
        .kerning-technical {
            letter-spacing: 0.15em;
        }
        /* Custom image masking for editorial feel */
        .editorial-mask {
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex flex-col items-center justify-center px-6 md:px-12 py-20 relative overflow-hidden">
<!-- Background Architectural Element -->
<div class="absolute top-0 right-0 w-1/3 h-full bg-surface-container-low -z-10 border-l border-outline-variant opacity-50"></div>
<!-- Onboarding Container -->
<div class="w-full max-w-2xl flex flex-col gap-16">
<!-- Step Indicators -->
<nav aria-label="Onboarding Progress" class="flex justify-start gap-4 items-center">
<div class="flex gap-2">
<div class="w-2 h-2 bg-outline-variant"></div>
<div class="w-2 h-2 bg-outline-variant"></div>
<div class="w-2 h-2 bg-outline-variant"></div>
<div class="w-2 h-2 bg-primary"></div>
</div>
<span class="text-[10px] font-label kerning-technical text-outline uppercase">Step 04 / 04</span>
</nav>
<!-- Main Content Area -->
<section class="flex flex-col gap-12">
<!-- Label & Headline -->
<div class="flex flex-col gap-6">
<span class="font-label text-xs kerning-technical text-primary uppercase">YOUR TO-DO</span>
<h1 class="font-headline text-3xl md:text-4xl kerning-editorial text-on-surface leading-tight max-w-xl uppercase">
                        Every evening you write intentions for the following day. Choose how many you want as standard.
                    </h1>
</div>
<!-- Interaction Design: The Number Scrubber -->
<div class="flex flex-col items-start gap-4 py-8 border-y border-outline-variant">
<div class="flex items-center gap-12">
<!-- Decrement -->
<button class="w-12 h-12 flex items-center justify-center border border-outline-variant hover:bg-on-surface hover:text-surface transition-colors active:scale-95 duration-200">
<span class="font-body text-xl">−</span>
</button>
<!-- Central Value -->
<div class="flex flex-col items-center">
<span class="font-headline text-[8rem] md:text-[10rem] leading-none text-on-surface">3</span>
</div>
<!-- Increment -->
<button class="w-12 h-12 flex items-center justify-center border border-outline-variant hover:bg-on-surface hover:text-surface transition-colors active:scale-95 duration-200">
<span class="font-body text-xl">+</span>
</button>
</div>
<p class="font-body text-xs kerning-technical text-on-surface-variant uppercase mt-4">
                        You can always adjust this on the day.
                    </p>
</div>
<!-- Footer Action -->
<div class="flex flex-col sm:flex-row items-center gap-12 pt-8">
<button class="group relative px-12 py-5 bg-primary text-on-primary font-label text-xs kerning-technical uppercase tracking-widest transition-all hover:bg-on-surface active:scale-95">
                        FINISH SETUP
                    </button>
<!-- Decorative Curated Element -->
<div class="hidden md:flex flex-col gap-1 border-l border-outline-variant pl-6">
<span class="text-[10px] font-label text-outline uppercase kerning-technical">Estimated Utility</span>
<span class="text-xs font-headline italic text-on-surface-variant">Enhanced daily focus and digital minimalism.</span>
</div>
</div>
</section>
<!-- Curated Visual Anchor -->
<aside class="w-full h-64 md:h-80 overflow-hidden relative grayscale sepia-[.2] opacity-80 mt-12">
<img alt="Minimalist desk workspace" class="w-full h-full object-cover" data-alt="Minimalist workspace with a clean wooden desk, a single open notebook, a high-end pen, and soft morning sunlight casting long shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3Zx-lfsCUec9hotf8GGzf6ZXYto5mujXmRosEqb3emK5dRqk9dhwfgIT9Qa-HMPJWpw3lBR4S__ksL4BoHQOFUA5txBrFscHvCWkm8MJtYrLyiiQAno56PH3-FL_PJ9-TqmIKTJbE_BrOkRn-kWl2Su61poTAhI4yvUEbVDsnaP69AbDM_rOLpzPevXl2a8XNh9OJJ7jCb0966CETD7YYYVQmzu_tgMyAa_53MYItqVti4_K8tpIWbjdhxqyj3oCCdIQX4u5wJXQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent opacity-40"></div>
</aside>
</div>
<!-- Structural Hairlines -->
<div class="fixed top-0 left-12 w-px h-full bg-outline-variant opacity-20 pointer-events-none"></div>
<div class="fixed bottom-12 left-0 w-full h-px bg-outline-variant opacity-20 pointer-events-none"></div>
</main>
<!-- Hidden Decorative Typography for Polish -->
<div class="fixed top-1/2 -right-20 -translate-y-1/2 rotate-90 pointer-events-none select-none overflow-hidden">
<span class="text-[12rem] font-headline text-surface-container-highest uppercase whitespace-nowrap leading-none opacity-40">CURATION</span>
</div>
</body></html>
