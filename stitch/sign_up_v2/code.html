<body class="bg-background text-on-surface flex flex-col min-h-screen">
<!-- TopAppBar Suppressed as per Destination Rule for Transactional Screens -->
<main class="flex-grow flex flex-col items-center justify-center px-6 md:px-12 py-20">
<!-- Header Section -->
<div class="w-full max-w-md mb-20 text-center">
<h1 class="font-headline text-[48px] uppercase tracking-[0.25em] leading-tight text-on-surface">
                HABIT MUSEUM
            </h1>
<div class="mt-4 h-[1px] w-12 bg-primary mx-auto"></div>
</div>
<!-- Sign Up Form -->
<div class="w-full max-w-md space-y-12">
<form action="#" class="space-y-10">
<!-- Email Field -->
<div class="group relative">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant mb-2" for="email">
                        Email Address
                    </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:ring-0 focus:border-primary px-0 py-3 font-body text-sm uppercase tracking-[0.15em] text-on-surface placeholder:text-outline-variant transition-colors" id="email" name="email" placeholder="yourname@domain.com" type="email"/>
</div>
<!-- Password Field -->
<div class="group relative">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant mb-2" for="password">
                        Password
                    </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:ring-0 focus:border-primary px-0 py-3 font-body text-sm uppercase tracking-[0.15em] text-on-surface placeholder:text-outline-variant transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password Field -->
<div class="group relative">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant mb-2" for="confirm-password">
                        Confirm Password
                    </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:ring-0 focus:border-primary px-0 py-3 font-body text-sm uppercase tracking-[0.15em] text-on-surface placeholder:text-outline-variant transition-colors" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
<!-- CTA Button -->
<div class="pt-8">
<button class="w-full bg-primary text-on-primary font-label text-[12px] font-semibold uppercase tracking-[0.2em] py-5 px-12 border-none transition-all duration-300 hover:opacity-90 active:scale-[0.98]" type="submit">
                        CREATE ACCOUNT
                    </button>
</div>
</form>
<!-- Login Link -->
<div class="text-center pt-4">
<p class="font-body text-[11px] uppercase tracking-[0.15em] text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold ml-2 underline-offset-4 hover:underline transition-all" href="#">
                        Log in
                    </a>
</p>
</div>
</div>
<!-- Decorative Architectural Element -->
<div class="absolute bottom-12 right-12 hidden lg:block">
<div class="flex flex-col items-end opacity-20">
<span class="font-headline text-6xl leading-none">03</span>
<span class="font-label text-[10px] tracking-[0.4em] uppercase mt-2">Access Portal</span>
</div>
</div>
</main>
<!-- Background Layering Detail -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-0 right-0 w-[40vw] h-full bg-surface-container-low opacity-50"></div>
