<body class="bg-surface text-on-surface min-h-screen flex flex-col font-sans selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Bar - Derived from TopAppBar JSON but suppressed for Transactional Onboarding Flow as per instructions, however using the styling cues -->
<header class="w-full px-12 py-10 flex justify-between items-end bg-[#FAF7F2] dark:bg-[#1A1A18]">
<div class="font-serif uppercase tracking-[0.25em] text-[#3D2B1A] dark:text-[#F0EAE0] text-2xl">
            JOURNAL
        </div>
<div class="flex gap-4">
<div class="w-2 h-2 bg-outline-variant"></div>
<div class="w-2 h-2 bg-outline-variant"></div>
<div class="w-2 h-2 bg-primary"></div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-20 max-w-4xl mx-auto w-full">
<!-- Onboarding Header Section -->
<section class="w-full text-center mb-24">
<span class="font-sans font-medium uppercase tracking-[0.25em] text-xs text-primary block mb-6">
                YOUR CHECK-IN
            </span>
<h1 class="font-serif font-light uppercase tracking-[0.25em] text-3xl md:text-5xl text-on-surface leading-tight max-w-2xl mx-auto">
                CHOOSE WHAT YOU WISH TO RECORD EVERY EVENING.
            </h1>
</section>
<!-- Configuration Section -->
<section class="w-full mb-24 grid grid-cols-1 md:grid-cols-12 gap-12 items-end">
<div class="md:col-span-6">
<label class="font-sans text-[10px] uppercase tracking-[0.2em] text-outline mb-4 block">NAME YOUR METRIC</label>
<input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-4 font-serif uppercase tracking-[0.15em] text-xl placeholder:text-outline-variant/50" placeholder="CHECK-IN NAME..." type="text"/>
</div>
<div class="md:col-span-6 flex items-center gap-6">
<div class="flex-grow">
<label class="font-sans text-[10px] uppercase tracking-[0.2em] text-outline mb-4 block">RESPONSE TYPE</label>
<div class="flex flex-wrap gap-x-6 gap-y-4 font-sans text-[11px] uppercase tracking-[0.15em] text-outline-variant">
<span class="cursor-pointer hover:text-on-surface transition-colors">YES/NO</span>
<span class="cursor-pointer hover:text-on-surface transition-colors">1–10</span>
<span class="cursor-pointer text-on-surface border-b border-primary pb-1">1–100</span>
<span class="cursor-pointer hover:text-on-surface transition-colors">NUMBER</span>
<span class="cursor-pointer hover:text-on-surface transition-colors">EMOTIONS</span>
<span class="cursor-pointer hover:text-on-surface transition-colors">FREE TEXT</span>
</div>
</div>
<button class="bg-primary text-on-primary w-14 h-14 flex items-center justify-center shrink-0 hover:bg-on-primary-fixed-variant transition-all">
<span class="material-symbols-outlined text-2xl">add</span>
</button>
</div>
</section>
<!-- Current List Section - Tonal Layering -->
<section class="w-full bg-surface-container-low p-12 mb-24">
<label class="font-sans text-[10px] uppercase tracking-[0.2em] text-outline mb-10 block">CURRENT SELECTIONS</label>
<div class="space-y-12">
<div class="flex justify-between items-baseline group">
<div class="flex flex-col gap-2">
<span class="font-serif text-2xl uppercase tracking-[0.1em]">SLEEP QUALITY</span>
<span class="font-sans text-[10px] uppercase tracking-[0.2em] text-outline">SCALE 1–100</span>
</div>
<button class="opacity-0 group-hover:opacity-100 transition-opacity text-outline-variant hover:text-error">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="flex justify-between items-baseline group">
<div class="flex flex-col gap-2">
<span class="font-serif text-2xl uppercase tracking-[0.1em]">MOOD</span>
<span class="font-sans text-[10px] uppercase tracking-[0.2em] text-outline">SCALE 1–10</span>
</div>
<button class="opacity-0 group-hover:opacity-100 transition-opacity text-outline-variant hover:text-error">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="flex justify-between items-baseline group">
<div class="flex flex-col gap-2">
<span class="font-serif text-2xl uppercase tracking-[0.1em]">GRATITUDE</span>
<span class="font-sans text-[10px] uppercase tracking-[0.2em] text-outline">FREE TEXT RESPONSE</span>
</div>
<button class="opacity-0 group-hover:opacity-100 transition-opacity text-outline-variant hover:text-error">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
</div>
</section>
<!-- Image Component - Architectural Context -->
<div class="w-full h-64 overflow-hidden mb-24 grayscale brightness-110 contrast-75">
<img alt="Journaling" class="w-full h-full object-cover" data-alt="Minimalist still life of an open archival journal on a limestone desk with soft shadows from a window" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6SHOXOIUS5dWPBikNDvdmISskPBzSbqIfvZL62B9e04Q8CWdzRKeXAlTGZK5tpBD55UbUSHjlSyoFvrMROY3KLo8Fz5PloLDo5gw59FutetibTCEP-eYxO51rLHDlbzISgtVA-LOIK0IodM2gUlr2xoDDK9UpU5YVzNk6bwQRhclHMwZRdamBqHF_yijh5TSAMWPpIH8XQIESWeLFsjgP3s14RGCITWPnP7ET13yY60YYyCOLubtmDZ8V0Fbvr--4W4rB5fcFghI"/>
</div>
<!-- Action Section -->
<div class="w-full flex justify-center">
<button class="bg-primary text-on-primary px-24 py-6 font-sans uppercase tracking-[0.25em] text-sm hover:bg-on-primary-fixed-variant transition-all active:scale-[0.98]">
                CONTINUE
            </button>
</div>
</main>
<!-- Footer Space for Balance -->
<footer class="w-full py-12 px-12 border-t border-outline-variant/20 flex justify-between items-center text-[10px] uppercase tracking-[0.2em] text-outline-variant">
<span>EST. 2026</span>
<span>© ARCHIVAL SYSTEM</span>
<span>PRIVATE &amp; ENCRYPTED</span>
</footer>
